<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>

        <input id="field" type="text" class="py-3 mb-2">
        <div class="keypad">
            <button id="7" class="">7</button>
            <button id="8" class="">8</button>
            <button id="9" class="">9</button>
            
            <button id="4" class="">4</button>
            <button id="5" class="">5</button>
            <button id="6" class="">6</button>
            
            <button id="1" class="">1</button>
            <button id="2" class="">2</button>
            <button id="3" class="">3</button>
            <button id="0" class="zero"> 0 </button>
            <button id="." class="opr ponto"> . </button>
            
            <button id="-" class="opr sub"> - </button>
            <button id="+" class="opr soma"> + </button>
            <button id="=" class="opr igual"> = </button>
            
        </div>

    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
