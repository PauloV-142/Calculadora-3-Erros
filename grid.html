<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
    * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
    }

    body{
        height: 100dvh !important;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgb(85, 85, 85);
        border: 2px solid rgb(68, 68, 68);
    }

    button{
        min-width: 5em;
        min-height: 5em;

        background-color: rgb(22, 182, 182);
        color: white;
        text-align: center;
        border: none;
        border-radius: .3em;

        
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,  Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        font-weight: 700;

        &:hover{
            box-shadow: 0px 0px 10px 5px #0dcaf0;
        }
    }

    main {
        border: .3em groove grey;
        padding: 2rem;
        background-color: rgb(29, 29, 29);
        border-radius: 1rem;
    }

    input {
        width: 100%;
        border-radius: .3em;
    }

    .keypad {        
        display: grid;
        gap: 0.2em;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr 1fr;
        .zero {
            grid-column-start: 1;
            grid-column-end: 3;
        }
        .mais {
            grid-row-start: 2;
            grid-row-end: 3;
            grid-column-start: 4;
            grid-column-end: 5;
        }
        .menos {
            grid-row-start: 1;
            grid-row-end: 2; 
            grid-column-start: 4;
            grid-column-end: 5;
        }
        .igual {
            grid-column-start: 4;
            grid-column-end: 5;
            grid-row-start: 3;
            grid-row-end: 5;
        }
        .opr {
            background-color: rgb(25, 197, 140);
        }
    }
    </style>
</head>

<body>
    <main>

        <input id="field" type="text" class="py-3 mb-2">
        <div class="keypad">
            <button id="7" class="">7</button>
            <button id="8" class="">8</button>
            <button id="9" class="">9</button>
            
            <button id="4" class="">4</button>
            <button id="5" class="">5</button>
            <button id="6" class="">6</button>
            
            <button id="1" class="">1</button>
            <button id="2" class="">2</button>
            <button id="3" class="">3</button>
            <button id="0" class="zero"> 0 </button>
            <button id="." class="opr ponto"> . </button>
            
            <button id="-" class="opr menos"> - </button>
            <button id="+" class="opr mais"> + </button>
            <button id="=" class="opr igual"> = </button>
            
        </div>

    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
