<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <!-- <style>
    body {
        background-color: black;
    }
    </style> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>

        <div class="keypad d-flex justify-content-center align-items-center">
            <table>
                <tr>
                    <td colspan="3" style="text-align: center;">
                        <input id="field" type="text" class="py-1">
                    </td>
                </tr>
                <tr>
                    <td><button id="7" type="button" class="btn btn-info">7</button></td>
                    <td><button id="8" type="button" class="btn btn-info">8</button></td>
                    <td><button id="9" type="button" class="btn btn-info">9</button></td>
                </tr>
                <tr>
                    <td><button id="6" type="button" class="btn btn-info">6</button></td>
                    <td><button id="5" type="button" class="btn btn-info">5</button></td>
                    <td><button id="4" type="button" class="btn btn-info">4</button></td>

                </tr>
                <tr>
                    <td><button id="3" type="button" class="btn btn-info">3</button></td>
                    <td><button id="2" type="button" class="btn btn-info">2</button></td>
                    <td><button id="1" type="button" class="btn btn-info">1</button></td>
                </tr>
                <tr>
                    <td colspan=""><button id="0" type="button" class="btn btn-info"> 0 </button></td>
                    <td><button id="-" type="button" class="btn btn-info operator"> - </button></td>
                    <td><button id="+" type="button" class="btn btn-info operator"> + </button></td>
                </tr>
            </table>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
