<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>

        <input id="field" type="text" class="py-3 mb-2">
        <div class="keypad">
            <button id="7">7</button><button id="8">8</button><button id="9">9</button>
            <button id="4">4</button><button id="5">5</button><button id="6">6</button>
            <button id="1">1</button><button id="2">2</button><button id="3">3</button>
            
            <button id="0" class="zero"> 0 </button>
            <button class="opr ponto"> . </button>
            
            <button id="c" class="c"> C </button>
            <button class="opr sub"> - </button>
            <button class="opr soma"> + </button>
            <button class="opr igual"> = </button>
            
        </div>

    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
